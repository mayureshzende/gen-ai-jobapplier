<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <meta charset="utf-8">
  <title>Tracker — Register</title>
  <link rel="stylesheet" href="_ds/modernist-edaf2adc-2368-4f9d-b4d3-44e6539866bb/styles.css">
  <script src="_ds/modernist-edaf2adc-2368-4f9d-b4d3-44e6539866bb/_ds_bundle.js"></script>
  <style>
    body { margin: 0; }
    :root {
      --radius-sm: 10px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --color-divider: color-mix(in srgb, #201e1d 18%, transparent);
    }
    .nav {
      backdrop-filter: blur(16px) saturate(160%);
      -webkit-backdrop-filter: blur(16px) saturate(160%);
      background: color-mix(in srgb, var(--color-bg) 75%, transparent);
    }
    .input, select.input, textarea.input {
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      background: color-mix(in srgb, var(--color-surface) 88%, transparent);
    }
    .card { backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
    .tag { border-radius: 999px; }
    .hr { border-radius: 999px; }
  </style>
</helmet>

<div style="background:var(--color-bg); color:var(--color-text); min-height:100vh; display:flex; flex-direction:column;">

  <!-- Nav -->
  <nav class="nav" style="padding-left:32px; padding-right:32px;">
    <span class="nav-brand">Tracker</span>
    <a href="Login.dc.html" style="margin-left:auto;">Already have an account? Log In</a>
  </nav>

  <div style="flex:1; display:flex; align-items:center; justify-content:center; padding:40px 24px;">
    <div style="width:100%; max-width:420px;">

      <h6 style="color:var(--color-accent); margin-bottom:6px;">Get started</h6>
      <h2 style="margin-bottom:6px;">Create Account</h2>
      <p style="opacity:0.7; font-size:14px; margin-bottom:32px;">Track applications and generate tailored resumes and cover letters.</p>

      <div style="display:flex; flex-direction:column; gap:20px; border-top:2px solid var(--color-divider); padding-top:24px;">

        <div class="field">
          <label for="reg-username">Username</label>
          <input class="input" id="reg-username" type="text" placeholder="jane_doe" value="{{ username }}" onChange="{{ onUsernameChange }}">
        </div>

        <div class="field">
          <label for="reg-email">Email</label>
          <input class="input" id="reg-email" type="email" placeholder="you@example.com" value="{{ email }}" onChange="{{ onEmailChange }}">
        </div>

        <div class="field">
          <label for="reg-password">Password</label>
          <input class="input" id="reg-password" type="password" placeholder="••••••••" value="{{ password }}" onChange="{{ onPasswordChange }}">
          <span style="font-size:11px; opacity:0.55;">Minimum 8 characters</span>
        </div>

        <sc-if value="{{ hasError }}" hint-placeholder-val="{{ false }}">
          <div style="font-size:12px; color:var(--color-accent-700); padding:10px 12px; background:var(--color-accent-100);">{{ errorMessage }}</div>
        </sc-if>

        <button class="btn btn-primary btn-block" onClick="{{ submitRegister }}" disabled="{{ isLoading }}" style="white-space:nowrap;">
          {{ submitLabel }}
        </button>

        <p style="font-size:11px; opacity:0.55; margin:0;">By creating an account you agree to the Terms of Service and Privacy Policy.</p>

      </div>

    </div>
  </div>

</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { username: '', email: '', password: '', loading: false, error: '' };

  submitRegister() {
    if (this.state.loading) return;
    if (!this.state.username.trim() || !this.state.email.trim() || !this.state.password.trim()) {
      this.setState({ error: 'Fill in username, email, and password.' });
      return;
    }
    if (this.state.password.length < 8) {
      this.setState({ error: 'Password must be at least 8 characters.' });
      return;
    }
    this.setState({ loading: true, error: '' });
    setTimeout(() => {
      window.location.href = 'Profile.dc.html';
    }, 800);
  }

  renderVals() {
    return {
      username: this.state.username,
      email: this.state.email,
      password: this.state.password,
      hasError: !!this.state.error,
      errorMessage: this.state.error,
      isLoading: this.state.loading,
      submitLabel: this.state.loading ? 'Creating account…' : 'Create Account',
      onUsernameChange: (e) => this.setState({ username: e.target.value }),
      onEmailChange: (e) => this.setState({ email: e.target.value }),
      onPasswordChange: (e) => this.setState({ password: e.target.value }),
      submitRegister: () => this.submitRegister(),
    };
  }
}
</script>
</body>
</html>
