<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <meta charset="utf-8">
  <title>Tracker — Add Application</title>
  <link rel="stylesheet" href="_ds/modernist-edaf2adc-2368-4f9d-b4d3-44e6539866bb/styles.css">
  <script src="_ds/modernist-edaf2adc-2368-4f9d-b4d3-44e6539866bb/_ds_bundle.js"></script>
  <style>
    body { margin: 0; }
    :root {
      --radius-sm: 10px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --color-divider: color-mix(in srgb, #201e1d 18%, transparent);
    }
    .nav {
      backdrop-filter: blur(16px) saturate(160%);
      -webkit-backdrop-filter: blur(16px) saturate(160%);
      background: color-mix(in srgb, var(--color-bg) 75%, transparent);
    }
    .input, select.input, textarea.input {
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      background: color-mix(in srgb, var(--color-surface) 88%, transparent);
    }
    .card { backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
    .tag { border-radius: 999px; }
    .hr { border-radius: 999px; }
  </style>
</helmet>

<div style="{{ rootStyle }}">

  <!-- Demo controls -->
  <div style="display:flex; align-items:center; gap:24px; padding:10px 32px; background:var(--color-surface); border-bottom:1px solid var(--color-divider); flex-wrap:wrap;">
    <span style="font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:color-mix(in srgb, var(--color-text) 55%, transparent); font-weight:800;">Demo controls</span>
    <div style="display:flex; align-items:center; gap:8px;">
      <span style="font-size:11px; color:color-mix(in srgb, var(--color-text) 60%, transparent);">Theme</span>
      <div style="display:inline-flex; border:1px solid var(--color-divider);">
        <button onClick="{{ setThemeLight }}" style="{{ themeLightStyle }}">Light</button>
        <button onClick="{{ setThemeDark }}" style="{{ themeDarkStyle }}">Dark</button>
      </div>
    </div>
  </div>

  <!-- Nav -->
  <nav class="nav" style="padding-left:32px; padding-right:32px;">
    <span class="nav-brand">Tracker</span>
    <a href="Dashboard.dc.html">Dashboard</a>
    <a href="#" aria-current="page">Applications</a>
    <a href="Profile.dc.html">Profile</a>
    <a href="Generate.dc.html">Generate</a>
    <dc-import name="UserMenu" hint-size="180px,44px" style="margin-left:auto;"></dc-import>
  </nav>

  <div style="max-width:760px; margin:0 auto; padding:48px 32px 80px;">
    <h6 style="color:var(--color-accent); margin-bottom:6px;">Applications / New</h6>
    <h2 style="margin-bottom:4px;">Add New Application</h2>
    <p style="opacity:0.7; font-size:14px; margin-bottom:32px;">Track a role you're applying to — the job description below feeds the resume &amp; cover letter generator.</p>

    <div style="border-top:2px solid var(--color-divider); padding-top:32px; display:grid; grid-template-columns:1fr 1fr; gap:24px 20px;">

      <div class="field">
        <label for="company">Company</label>
        <input class="input" id="company" type="text" placeholder="e.g. Stripe">
      </div>

      <div class="field">
        <label for="role">Role Title</label>
        <input class="input" id="role" type="text" placeholder="e.g. Senior Product Designer">
      </div>

      <div class="field">
        <label for="location">Location</label>
        <input class="input" id="location" type="text" placeholder="e.g. Remote, San Francisco CA">
      </div>

      <div class="field">
        <label for="salary">Salary Range</label>
        <input class="input" id="salary" type="text" placeholder="e.g. $140k – $170k">
      </div>

      <sc-if value="{{ showStatusField }}" hint-placeholder-val="{{ true }}">
        <div class="field">
          <label for="status">Status</label>
          <select class="input" id="status" value="{{ status }}" onChange="{{ onStatusChange }}">
            <option value="Saved">Saved</option>
            <option value="Applied">Applied</option>
            <option value="Interview">Interview</option>
            <option value="Offer">Offer</option>
            <option value="Rejected">Rejected</option>
          </select>
        </div>
      </sc-if>

      <div class="field" style="grid-column:1 / -1;">
        <label>Source</label>
        <div class="seg">
          <label class="seg-opt"><input type="radio" name="source" checked="{{ true }}">LinkedIn</label>
          <label class="seg-opt"><input type="radio" name="source">Indeed</label>
          <label class="seg-opt"><input type="radio" name="source">Referral</label>
          <label class="seg-opt"><input type="radio" name="source">Other</label>
        </div>
      </div>

      <div class="field" style="grid-column:1 / -1;">
        <label for="jd">Job Description</label>
        <textarea class="input" id="jd" placeholder="Paste the full job description here — used to tailor the generated resume and cover letter." style="min-height:220px;"></textarea>
      </div>

    </div>

    <div style="display:flex; gap:12px; margin-top:32px; border-top:1px solid var(--color-divider); padding-top:24px;">
      <button class="btn btn-primary" style="white-space:nowrap;">Save Application</button>
      <button class="btn btn-secondary">Cancel</button>
    </div>
  </div>

</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;showStatusField&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Form&quot;}}">
function segStyle(activeVal, val, isFirst) {
  return {
    padding: '6px 14px',
    fontFamily: 'var(--font-heading)',
    fontWeight: 800,
    fontSize: '11px',
    letterSpacing: '0.04em',
    textTransform: 'uppercase',
    cursor: 'pointer',
    border: 'none',
    borderLeft: isFirst ? 'none' : '1px solid var(--color-divider)',
    background: activeVal === val ? 'var(--color-accent)' : 'transparent',
    color: activeVal === val ? 'var(--color-bg)' : 'var(--color-text)',
  };
}

class Component extends DCLogic {
  state = { theme: 'light', status: 'Applied' };

  renderVals() {
    const isDark = this.state.theme === 'dark';
    const rootStyle = isDark
      ? { '--color-bg': '#17161b', '--color-surface': '#211f24', '--color-text': '#f2f0ef', background: 'var(--color-bg)', color: 'var(--color-text)', minHeight: '100vh' }
      : { background: 'var(--color-bg)', color: 'var(--color-text)', minHeight: '100vh' };

    return {
      rootStyle,
      themeLightStyle: segStyle(this.state.theme, 'light', true),
      themeDarkStyle: segStyle(this.state.theme, 'dark', false),
      setThemeLight: () => this.setState({ theme: 'light' }),
      setThemeDark: () => this.setState({ theme: 'dark' }),
      showStatusField: this.props.showStatusField ?? true,
      status: this.state.status,
      onStatusChange: (e) => this.setState({ status: e.target.value }),
    };
  }
}
</script>
</body>
</html>
